[tool.pytest.ini_options]
# test_grayscale and test_wheels are Pi hardware scripts, not pytest tests.
addopts = "--ignore=tests/test_grayscale.py --ignore=tests/test_wheels.py"

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (unused imports, undefined names)
    "I",   # isort (import ordering)
    "W",   # pycodestyle warnings
]
ignore = [
    "E501",  # line too long — not enforced, format manually
]
