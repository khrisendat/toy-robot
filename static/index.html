<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c1222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #60a5fa;
      user-select: none;
    }

    #face { width: min(75vw, 300px); height: auto; overflow: visible; }

    /* ── Face body movement ─────────────────────────── */
    #face-body { transform-box: view-box; transform-origin: center; }
    .s-follow_up #face-body { animation: float  3.4s ease-in-out infinite; }
    .s-listening #face-body { animation: float  1.5s ease-in-out infinite; }
    .s-speaking  #face-body { animation: float  2.2s ease-in-out infinite; }
    .s-thinking  #face-body { animation: tilt   2s   ease-in-out infinite; }

    /* ── Cheeks ─────────────────────────────────────── */
    .cheek { opacity: 0; }
    .s-follow_up .cheek { opacity: .1; }
    .s-listening .cheek { animation: cheek-pulse .6s  ease-in-out infinite alternate; }
    .s-speaking  .cheek { animation: cheek-pulse 1.1s ease-in-out infinite alternate; }

    /* ── Sleeping (awaiting wake word) ─────────────────── */
    .s-sleeping #face-body    { animation: float 5s ease-in-out infinite; }
    .s-sleeping .eyelid       { animation: sleep-blink 6s ease-in-out infinite;
                                  transform-box: fill-box; transform-origin: top center; }
    .s-sleeping .cheek        { opacity: 0; }
    .s-sleeping .speak-line   { opacity: 0; }
    .s-sleeping .idle-mouth   { opacity: 1; }
    .s-sleeping .antenna-ball { animation: ant-pulse 5s ease-in-out infinite; }

    /* ── Follow-up (90s conversation window) ───────── */
    .s-follow_up .antenna-ball { animation: ant-pulse 2.5s ease-in-out infinite; }
    .s-follow_up .eyelid       { animation: blink 4s ease-in-out infinite; }
    .s-follow_up .speak-line   { opacity: 0; }
    .s-follow_up .idle-mouth   { opacity: 1; }

    /* ── Listening ──────────────────────────────────── */
    .s-listening .eye-iris     { animation: iris-glow .5s ease-in-out infinite alternate; }
    .s-listening .eye-pupil    { animation: pupil-grow .3s ease-out forwards;
                                  transform-box: fill-box; transform-origin: center; }
    .s-listening .antenna-ball { animation: ant-bounce .35s ease-in-out infinite alternate; }
    .s-listening .speak-line   { opacity: 0; }
    .s-listening .idle-mouth   { opacity: 1; }

    /* ── Thinking ───────────────────────────────────── */
    .s-thinking .eye-pupil    { animation: look-around 1.4s ease-in-out infinite; }
    .s-thinking .eyelid       { animation: squint 1.6s ease-in-out infinite; }
    .s-thinking .antenna-ball { animation: ant-think 1.5s ease-in-out infinite;
                                  transform-box: fill-box; transform-origin: center; }
    .s-thinking .speak-line   { opacity: 0; }
    .s-thinking .idle-mouth   { opacity: 1; }

    /* ── Speaking ───────────────────────────────────── */
    .s-speaking .idle-mouth    { opacity: 0; }
    .s-speaking .speak-line    { animation: speak-pulse .28s ease-in-out infinite alternate;
                                   transform-box: fill-box; transform-origin: center; }
    .s-speaking .eyelid        { animation: happy-squint 2s ease-in-out infinite; }
    .s-speaking .eye-iris      { animation: iris-glow 1.4s ease-in-out infinite alternate; }
    .s-speaking .antenna-ball  { animation: ant-bounce .55s ease-in-out infinite alternate; }

    /* ── Keyframes ──────────────────────────────────── */
    @keyframes float        { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-10px)} }
    @keyframes tilt         { 0%,100%{transform:rotate(0deg)}   50%{transform:rotate(-3.5deg)} }
    @keyframes ant-pulse    { 0%,100%{opacity:1}  50%{opacity:.1} }
    @keyframes ant-bounce   { from{transform:translateY(0)} to{transform:translateY(-7px)} }
    @keyframes ant-think    { 0%,100%{transform:scale(1);opacity:1}
                              33%{transform:scale(.45);opacity:.15}
                              66%{transform:scale(1.5);opacity:.9} }
    @keyframes sleep-blink  { 0%,88%,100%{transform:scaleY(1)} 93%{transform:scaleY(.8)} }
    @keyframes blink        { 0%,80%,100%{transform:scaleY(0)} 86%,93%{transform:scaleY(1)} }
    @keyframes squint       { 0%,100%{transform:scaleY(.35)} 50%{transform:scaleY(.6)} }
    @keyframes happy-squint { 0%,100%{transform:scaleY(0)} 40%,60%{transform:scaleY(.22)} }
    @keyframes iris-glow    { from{filter:drop-shadow(0 0 3px #38bdf8)}
                              to{filter:drop-shadow(0 0 22px #38bdf8)} }
    @keyframes pupil-grow   { to{transform:scale(1.45)} }
    @keyframes look-around  { 0%,100%{transform:translate(0,0)}
                              25%{transform:translate(-10px,-7px)}
                              75%{transform:translate(10px,-3px)} }
    @keyframes speak-pulse  { from{transform:scaleY(.05)} to{transform:scaleY(1)} }
    @keyframes cheek-pulse  { from{opacity:.3} to{opacity:.6} }

    /* ── UI ─────────────────────────────────────────── */
    #status {
      margin-top: 14px;
      font-size: .72rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      opacity: .4;
    }
    #setup-btn, #talk-btn {
      margin-top: 18px;
      padding: 13px 46px;
      border-radius: 999px;
      border: 2px solid #3b82f6;
      background: transparent;
      color: #60a5fa;
      font-family: inherit;
      font-size: .88rem;
      letter-spacing: .12em;
      cursor: pointer;
      transition: background .15s, color .15s, box-shadow .15s;
      touch-action: none;
    }
    #setup-btn:hover:not(:disabled),
    #talk-btn:hover:not(:disabled)  { box-shadow: 0 0 18px rgba(59,130,246,.45); }
    #setup-btn:disabled,
    #talk-btn:disabled              { opacity: .25; cursor: default; }
    #setup-btn.hidden,
    #talk-btn.hidden                { display: none; }
    #talk-btn:active:not(:disabled) { background: #1d4ed8; color: #fff; box-shadow: 0 0 24px rgba(59,130,246,.6); }
  </style>
</head>
<body>

<svg id="face" viewBox="0 0 240 310" xmlns="http://www.w3.org/2000/svg" class="s-sleeping">
  <defs>
    <linearGradient id="head-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a7fd4"/>
      <stop offset="100%" stop-color="#1e3f7a"/>
    </linearGradient>
    <linearGradient id="panel-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6096e8"/>
      <stop offset="100%" stop-color="#3060b0"/>
    </linearGradient>
    <linearGradient id="visor-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#050d1f"/>
      <stop offset="100%" stop-color="#091428"/>
    </linearGradient>
    <radialGradient id="eye-g" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </radialGradient>
  </defs>

  <g id="face-body">
    <!-- Antenna -->
    <line x1="120" y1="42" x2="120" y2="18" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
    <circle class="antenna-ball" cx="120" cy="12" r="7" fill="#60a5fa"
            style="transform-box:fill-box;transform-origin:center"/>

    <!-- Neck -->
    <rect x="88" y="255" width="64" height="32" rx="10" fill="#1e3a6e" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="98" y="262" width="44" height="18" rx="6"  fill="#162d55"/>

    <!-- Head base — slightly wider than before -->
    <rect x="12" y="42" width="216" height="218" rx="38" fill="url(#head-g)" stroke="#5b93e0" stroke-width="2"/>

    <!-- Top panel strip -->
    <rect x="42" y="42" width="156" height="28" rx="14" fill="url(#panel-g)"/>
    <circle cx="72"  cy="56" r="4" fill="#1e3f7a"/>
    <circle cx="120" cy="56" r="4" fill="#1e3f7a"/>
    <circle cx="168" cy="56" r="4" fill="#1e3f7a"/>

    <!-- Side ear panels -->
    <rect x="0"   y="118" width="18" height="56" rx="9" fill="#2a5aaa" stroke="#4a7fd4" stroke-width="1.5"/>
    <rect x="222" y="118" width="18" height="56" rx="9" fill="#2a5aaa" stroke="#4a7fd4" stroke-width="1.5"/>
    <circle cx="9"   cy="146" r="4" fill="#38bdf8" opacity=".7"/>
    <circle cx="231" cy="146" r="4" fill="#38bdf8" opacity=".7"/>

    <!-- Cheek blushes -->
    <ellipse class="cheek" cx="54"  cy="206" rx="22" ry="13" fill="#f472b6"/>
    <ellipse class="cheek" cx="186" cy="206" rx="22" ry="13" fill="#f472b6"/>

    <!-- Visor -->
    <rect x="28" y="100" width="184" height="100" rx="20" fill="url(#visor-g)" stroke="#1d4ed8" stroke-width="2"/>
    <rect x="32" y="104" width="176" height="92" rx="17" fill="none" stroke="#2563eb" stroke-width="1" opacity=".5"/>

    <!-- Left eye — smaller iris -->
    <circle class="eye-iris"  cx="88"  cy="150" r="19" fill="url(#eye-g)"/>
    <circle class="eye-pupil" cx="88"  cy="150" r="11" fill="#042040"
            style="transform-box:fill-box;transform-origin:center"/>
    <circle class="eye-shine"          cx="95"  cy="142" r="5"  fill="#e0f2fe" opacity=".7"/>
    <rect class="eyelid" x="69" y="131" width="38" height="38"
          fill="#091428" style="transform-box:fill-box;transform-origin:top center;transform:scaleY(0)"/>

    <!-- Right eye — smaller iris -->
    <circle class="eye-iris"  cx="152" cy="150" r="19" fill="url(#eye-g)"/>
    <circle class="eye-pupil" cx="152" cy="150" r="11" fill="#042040"
            style="transform-box:fill-box;transform-origin:center"/>
    <circle class="eye-shine"          cx="159" cy="142" r="5"  fill="#e0f2fe" opacity=".7"/>
    <rect class="eyelid" x="133" y="131" width="38" height="38"
          fill="#091428" style="transform-box:fill-box;transform-origin:top center;transform:scaleY(0)"/>

    <!-- Mouth area -->
    <rect x="72" y="222" width="96" height="26" rx="13" fill="#091428" stroke="#1d4ed8" stroke-width="1.5"/>
    <!-- Idle smile -->
    <path class="idle-mouth" d="M 86 232 Q 120 248 154 232" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <!-- Single speaking line (grows from center) -->
    <rect class="speak-line" x="116" y="224" width="8" height="22" rx="4" fill="#38bdf8"
          style="transform-box:fill-box;transform-origin:center;transform:scaleY(.05)"/>
  </g>
</svg>

<div id="status">Connecting…</div>
<button id="setup-btn" class="hidden">Tap to Start</button>
<button id="talk-btn"  class="hidden">Hold to Talk</button>

<script>
  const face     = document.getElementById('face');
  const statusEl = document.getElementById('status');
  const setupBtn = document.getElementById('setup-btn');
  const talkBtn  = document.getElementById('talk-btn');

  // ── Playback ───────────────────────────────────────────────────────────────
  let audioCtx      = null;
  let audioQueue    = Promise.resolve();
  let pendingAudio  = 0;
  let deferredState = null;

  // ── PCM streaming ──────────────────────────────────────────────────────────
  let workletNode      = null;
  let streamingEnabled = false;

  // ── State ──────────────────────────────────────────────────────────────────
  let busy = false;

  function setState(s) {
    face.setAttribute('class', 's-' + s);
    busy = s === 'thinking' || s === 'speaking';
    talkBtn.disabled = busy;
    const labels = { sleeping: "say 'hey robot'", follow_up: 'listening...' };
    statusEl.textContent = labels[s] ?? s;
    // sleeping/follow_up → resume streaming; thinking/speaking → pause streaming.
    // 'listening' is intentionally not set here — streaming must stay on
    // so the server's CommandRecorder continues receiving the command audio.
    if (s === 'sleeping' || s === 'follow_up') streamingEnabled = true;
    if (s === 'thinking' || s === 'speaking')  streamingEnabled = false;
  }

  // ── One-time setup (requires user gesture) ─────────────────────────────────
  async function setup() {
    setupBtn.disabled = true;

    // AudioContext must be created synchronously inside the gesture handler.
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let micStream;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true },
      });
    } catch (err) {
      statusEl.textContent = err.name === 'NotFoundError' ? 'no mic found' : 'mic error';
      setupBtn.disabled = false;
      return;
    }

    if (audioCtx.state === 'suspended') await audioCtx.resume();

    await audioCtx.audioWorklet.addModule('/static/worklet.js');
    workletNode = new AudioWorkletNode(audioCtx, 'pcm-downsampler');

    workletNode.port.onmessage = ({ data }) => {
      if (!streamingEnabled || ws.readyState !== WebSocket.OPEN) return;
      const bytes = new Uint8Array(data);
      ws.send(JSON.stringify({
        type: 'audio_chunk',
        data: btoa(String.fromCharCode(...bytes)),
      }));
    };

    audioCtx.createMediaStreamSource(micStream).connect(workletNode);

    setupBtn.classList.add('hidden');
    talkBtn.classList.remove('hidden');
    setState('sleeping');
  }

  setupBtn.addEventListener('click', setup);

  // ── Hold-to-Talk ───────────────────────────────────────────────────────────
  function sendPTT(type) {
    if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type }));
  }

  talkBtn.addEventListener('mousedown',  () => { if (!busy) sendPTT('push_to_talk'); });
  talkBtn.addEventListener('mouseup',    () => sendPTT('push_to_talk_end'));
  talkBtn.addEventListener('mouseleave', () => sendPTT('push_to_talk_end'));
  talkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!busy) sendPTT('push_to_talk'); });
  talkBtn.addEventListener('touchend',   (e) => { e.preventDefault(); sendPTT('push_to_talk_end'); });

  // ── Playback ───────────────────────────────────────────────────────────────
  function queueAudio(b64) {
    pendingAudio++;
    setState('speaking');
    audioQueue = audioQueue.then(async () => {
      try {
        const bytes  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const buffer = await audioCtx.decodeAudioData(bytes.buffer.slice());
        const src    = audioCtx.createBufferSource();
        src.buffer   = buffer;
        src.connect(audioCtx.destination);
        await new Promise(r => { src.onended = r; src.start(0); });
      } catch (e) {
        console.error('[audio]', e);
      } finally {
        pendingAudio--;
        if (pendingAudio === 0) { setState(deferredState ?? 'sleeping'); deferredState = null; }
      }
    });
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────
  const ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen  = () => { statusEl.textContent = 'tap to start'; setupBtn.classList.remove('hidden'); };
  ws.onclose = () => { statusEl.textContent = 'disconnected'; streamingEnabled = false; };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'state') {
      const deferUntilAudioDone = msg.state === 'sleeping' || msg.state === 'follow_up';
      if (deferUntilAudioDone) {
        if (pendingAudio === 0) { setState(msg.state); deferredState = null; }
        else deferredState = msg.state;
      } else if (msg.state !== 'speaking') {
        setState(msg.state);
      }
    } else if (msg.type === 'audio') {
      queueAudio(msg.data);
    } else if (msg.type === 'speak') {
      speechSynthesis.speak(new SpeechSynthesisUtterance(msg.text));
    }
  };
</script>
</body>
</html>
