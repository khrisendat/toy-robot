<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #070b14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #4d9fff;
      user-select: none;
    }

    #face { width: min(80vw, 360px); height: auto; overflow: visible; }

    /* ── Base elements ───────────────────────────────── */
    .head         { fill: url(#head-grad); stroke: #4d9fff; stroke-width: 2.5;
                    filter: drop-shadow(0 0 18px rgba(77,159,255,0.25)); }
    .ear          { fill: #0e2044; stroke: #4d9fff; stroke-width: 2; }
    .antenna-stem { stroke: #4d9fff; stroke-width: 2.5; }
    .antenna-ball { fill: #4d9fff; }

    .eye-frame    { fill: #050d1a; stroke: #4d9fff; stroke-width: 2.5; }
    .iris         { fill: #4d9fff; }
    .pupil        { fill: #050d1a; }
    .eye-shine    { fill: #fff; opacity: 0.55; }
    /* Eyelid slides down to cover the eye on blink */
    .eyelid       { fill: #122040; transform-box: fill-box; transform-origin: top center; transform: scaleY(0); }

    .mouth-frame  { fill: #050d1a; stroke: #4d9fff; stroke-width: 2.5; }
    .mouth-bar    { fill: #4d9fff; transform-box: fill-box; transform-origin: bottom center; }
    .idle-mouth   { stroke: #4d9fff; stroke-width: 3; stroke-linecap: round; }

    /* ── Idle ────────────────────────────────────────── */
    .s-idle .antenna-ball { animation: ant-idle 3s ease-in-out infinite; }
    .s-idle .eyelid       { animation: blink 5s ease-in-out infinite; }
    .s-idle .mouth-bar    { transform: scaleY(0.15); }
    .s-idle .idle-mouth   { opacity: 1; }

    @keyframes ant-idle {
      0%,100% { opacity:1; } 50% { opacity:0.25; }
    }
    @keyframes blink {
      0%,85%,100% { transform:scaleY(0); }
      91%,96%     { transform:scaleY(1); }
    }

    /* ── Listening ───────────────────────────────────── */
    .s-listening .eye-frame    { animation: eye-glow 0.7s ease-in-out infinite alternate; }
    .s-listening .iris         { animation: iris-pop 0.25s ease forwards; }
    .s-listening .antenna-ball { animation: ant-listen 0.5s ease-in-out infinite; }
    .s-listening .mouth-bar    { transform: scaleY(0.15); }
    .s-listening .idle-mouth   { opacity: 1; }

    @keyframes eye-glow {
      from { filter: drop-shadow(0 0 4px #4d9fff); }
      to   { filter: drop-shadow(0 0 16px #4d9fff); }
    }
    @keyframes iris-pop { to { r: 21; } }
    @keyframes ant-listen { 0%,100%{opacity:1;} 50%{opacity:0;} }

    /* ── Thinking ────────────────────────────────────── */
    .s-thinking .pupil      { animation: pupils-think 1.8s ease-in-out infinite; }
    .s-thinking .eyelid     { animation: squint 1.8s ease-in-out infinite; }
    .s-thinking .mouth-bar  { transform: scaleY(0.15); }
    .s-thinking .idle-mouth { opacity: 1; }

    @keyframes pupils-think {
      0%,100% { transform:translate(0,0); }
      30%     { transform:translate(-7px,-6px); }
      70%     { transform:translate(7px,-4px); }
    }
    @keyframes squint {
      0%,100% { transform:scaleY(0.38); }
      50%     { transform:scaleY(0.48); }
    }

    /* ── Speaking ────────────────────────────────────── */
    .s-speaking .idle-mouth { opacity: 0; }
    .s-speaking .mouth-bar  { animation: bar var(--d,0.4s) ease-in-out infinite alternate; }
    .s-speaking .mouth-bar:nth-child(1){--d:0.36s;animation-delay:0.00s;}
    .s-speaking .mouth-bar:nth-child(2){--d:0.27s;animation-delay:0.06s;}
    .s-speaking .mouth-bar:nth-child(3){--d:0.43s;animation-delay:0.02s;}
    .s-speaking .mouth-bar:nth-child(4){--d:0.31s;animation-delay:0.10s;}
    .s-speaking .mouth-bar:nth-child(5){--d:0.39s;animation-delay:0.04s;}
    .s-speaking .mouth-bar:nth-child(6){--d:0.25s;animation-delay:0.08s;}
    .s-speaking .mouth-bar:nth-child(7){--d:0.34s;animation-delay:0.12s;}

    @keyframes bar {
      from { transform:scaleY(0.15); }
      to   { transform:scaleY(1.0); }
    }

    /* ── UI chrome ───────────────────────────────────── */
    #status {
      margin-top: 16px;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.45;
    }
    #talk-btn {
      margin-top: 20px;
      padding: 14px 52px;
      border-radius: 999px;
      border: 2px solid #4d9fff;
      background: transparent;
      color: #4d9fff;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }
    #talk-btn:not(:disabled):hover { box-shadow: 0 0 20px rgba(77,159,255,0.4); }
    #talk-btn.recording            { background: #4d9fff; color: #070b14; }
    #talk-btn:disabled             { opacity: 0.22; cursor: default; }
  </style>
</head>
<body>

<svg id="face" viewBox="0 0 300 350" xmlns="http://www.w3.org/2000/svg" class="s-idle">
  <defs>
    <radialGradient id="head-grad" cx="42%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#1e3f7a"/>
      <stop offset="100%" stop-color="#0b1a35"/>
    </radialGradient>
  </defs>

  <!-- Antenna -->
  <line class="antenna-stem" x1="150" y1="72" x2="150" y2="36"/>
  <circle class="antenna-ball" cx="150" cy="27" r="9"/>

  <!-- Round head -->
  <circle class="head" cx="150" cy="192" r="122"/>

  <!-- Ear discs -->
  <circle class="ear" cx="28"  cy="192" r="14"/>
  <circle class="ear" cx="272" cy="192" r="14"/>
  <!-- Ear inner bolts -->
  <circle cx="28"  cy="192" r="5" fill="#4d9fff" opacity="0.6"/>
  <circle cx="272" cy="192" r="5" fill="#4d9fff" opacity="0.6"/>

  <!-- ── Left eye (screen) ── -->
  <rect class="eye-frame" x="64" y="138" width="74" height="62" rx="12"/>
  <!-- iris glow layer -->
  <circle class="iris"  cx="101" cy="169" r="18"/>
  <!-- pupil -->
  <circle class="pupil" cx="101" cy="169" r="11"/>
  <!-- highlight -->
  <circle class="eye-shine" cx="109" cy="160" r="5"/>
  <!-- eyelid (covers eye for blink/squint) -->
  <rect class="eyelid" x="64" y="138" width="74" height="62" rx="12"/>

  <!-- ── Right eye (screen) ── -->
  <rect class="eye-frame" x="162" y="138" width="74" height="62" rx="12"/>
  <circle class="iris"  cx="199" cy="169" r="18"/>
  <circle class="pupil" cx="199" cy="169" r="11"/>
  <circle class="eye-shine" cx="207" cy="160" r="5"/>
  <rect class="eyelid" x="162" y="138" width="74" height="62" rx="12"/>

  <!-- ── Mouth ── -->
  <rect class="mouth-frame" x="85" y="226" width="130" height="50" rx="12"/>
  <!-- idle flat line -->
  <line class="idle-mouth" x1="99" y1="251" x2="201" y2="251"/>
  <!-- speaking bars (7) -->
  <g>
    <rect class="mouth-bar" x="99"  y="230" width="11" height="38" rx="3"/>
    <rect class="mouth-bar" x="114" y="230" width="11" height="38" rx="3"/>
    <rect class="mouth-bar" x="129" y="230" width="11" height="38" rx="3"/>
    <rect class="mouth-bar" x="144" y="230" width="11" height="38" rx="3"/>
    <rect class="mouth-bar" x="159" y="230" width="11" height="38" rx="3"/>
    <rect class="mouth-bar" x="174" y="230" width="11" height="38" rx="3"/>
    <rect class="mouth-bar" x="189" y="230" width="11" height="38" rx="3"/>
  </g>
</svg>

<div id="status">Connecting…</div>
<button id="talk-btn" disabled>Hold to Talk</button>

<script>
  const face     = document.getElementById('face');
  const statusEl = document.getElementById('status');
  const btn      = document.getElementById('talk-btn');

  function setState(s) { face.className = 's-' + s; statusEl.textContent = s; }

  const ws       = new WebSocket(`ws://${location.host}/ws`);
  let mediaRecorder = null, audioChunks = [];
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  let audioQueue   = Promise.resolve();
  let pendingAudio = 0;

  function queueAudio(b64) {
    pendingAudio++;
    setState('speaking');
    console.log('[audio] queued, pending=', pendingAudio);
    audioQueue = audioQueue.then(async () => {
      try {
        const bytes  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        console.log('[audio] decoding', bytes.length, 'bytes');
        const buffer = await audioCtx.decodeAudioData(bytes.buffer.slice());
        const src    = audioCtx.createBufferSource();
        src.buffer   = buffer;
        src.connect(audioCtx.destination);
        await new Promise(r => { src.onended = r; src.start(0); });
        console.log('[audio] finished playing');
      } catch(e) {
        console.error('[audio] error:', e);
      } finally {
        pendingAudio--;
        console.log('[audio] pending now=', pendingAudio);
        if (pendingAudio === 0) setState('idle');
      }
    });
  }

  ws.onopen  = () => { setState('idle'); btn.disabled = false; };
  ws.onclose = () => { statusEl.textContent = 'disconnected'; btn.disabled = true; };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    console.log('[ws]', msg.type, msg.state ?? '');
    if (msg.type === 'state') {
      if (msg.state !== 'speaking' && msg.state !== 'idle') setState(msg.state);
    } else if (msg.type === 'audio') {
      queueAudio(msg.data);
    } else if (msg.type === 'speak') {
      speechSynthesis.speak(new SpeechSynthesisUtterance(msg.text));
    }
  };

  btn.addEventListener('mousedown',  startRecording);
  btn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  btn.addEventListener('mouseup',    stopRecording);
  btn.addEventListener('touchend',   stopRecording);

  async function startRecording() {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    btn.classList.add('recording');
    const stream  = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks   = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = sendAudio;
    mediaRecorder.start();
    setState('listening');
  }

  function stopRecording() {
    btn.classList.remove('recording');
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }

  async function sendAudio() {
    const blob   = new Blob(audioChunks, { type: 'audio/webm' });
    const buffer = await blob.arrayBuffer();
    const b64    = btoa(String.fromCharCode(...new Uint8Array(buffer)));
    ws.send(JSON.stringify({ type: 'audio', data: b64 }));
  }
</script>
</body>
</html>
