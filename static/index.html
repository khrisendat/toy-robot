<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c1222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #60a5fa;
      user-select: none;
    }

    #face { width: min(75vw, 300px); height: auto; overflow: visible; }

    /* ── Idle ───────────────────────────────────────── */
    .s-idle .antenna-ball  { animation: ant-pulse 2.5s ease-in-out infinite; }
    .s-idle .eyelid        { animation: blink 4s ease-in-out infinite; }
    .s-idle .mouth-bar     { transform: scaleY(0.12); }
    .s-idle .idle-mouth    { opacity: 1; }
    .s-idle .open-mouth    { opacity: 0; }

    /* ── Listening ──────────────────────────────────── */
    .s-listening .eye-iris      { animation: iris-glow 0.6s ease-in-out infinite alternate; }
    .s-listening .antenna-ball  { animation: ant-pulse 0.4s ease-in-out infinite; }
    .s-listening .mouth-bar     { transform: scaleY(0.12); }
    .s-listening .idle-mouth    { opacity: 1; }
    .s-listening .open-mouth    { opacity: 0; }

    /* ── Thinking ───────────────────────────────────── */
    .s-thinking .eye-pupil   { animation: look-around 1.6s ease-in-out infinite; }
    .s-thinking .eyelid      { animation: squint 1.6s ease-in-out infinite; }
    .s-thinking .mouth-bar   { transform: scaleY(0.12); }
    .s-thinking .idle-mouth  { opacity: 1; }
    .s-thinking .open-mouth  { opacity: 0; }

    /* ── Speaking ───────────────────────────────────── */
    .s-speaking .idle-mouth  { opacity: 0; }
    .s-speaking .open-mouth  { opacity: 0; }
    .s-speaking .mouth-bar   { animation: bar var(--d,.38s) ease-in-out infinite alternate; }
    .s-speaking .mouth-bar:nth-child(1){--d:.35s;animation-delay:.00s}
    .s-speaking .mouth-bar:nth-child(2){--d:.26s;animation-delay:.06s}
    .s-speaking .mouth-bar:nth-child(3){--d:.42s;animation-delay:.02s}
    .s-speaking .mouth-bar:nth-child(4){--d:.30s;animation-delay:.09s}
    .s-speaking .mouth-bar:nth-child(5){--d:.38s;animation-delay:.04s}

    /* ── Keyframes ──────────────────────────────────── */
    @keyframes ant-pulse  { 0%,100%{opacity:1} 50%{opacity:.15} }
    @keyframes blink      { 0%,82%,100%{transform:scaleY(0)} 88%,95%{transform:scaleY(1)} }
    @keyframes squint     { 0%,100%{transform:scaleY(.4)} 50%{transform:scaleY(.5)} }
    @keyframes iris-glow  { from{filter:drop-shadow(0 0 4px #38bdf8)} to{filter:drop-shadow(0 0 14px #38bdf8)} }
    @keyframes look-around{ 0%,100%{transform:translate(0,0)} 30%{transform:translate(-7px,-5px)} 70%{transform:translate(7px,-3px)} }
    @keyframes bar        { from{transform:scaleY(.12)} to{transform:scaleY(1)} }

    /* ── UI ─────────────────────────────────────────── */
    #status {
      margin-top: 14px;
      font-size: .72rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      opacity: .4;
    }
    #talk-btn {
      margin-top: 18px;
      padding: 13px 46px;
      border-radius: 999px;
      border: 2px solid #3b82f6;
      background: transparent;
      color: #60a5fa;
      font-family: inherit;
      font-size: .88rem;
      letter-spacing: .12em;
      cursor: pointer;
      transition: background .15s, color .15s, box-shadow .15s;
    }
    #talk-btn:not(:disabled):hover { box-shadow: 0 0 18px rgba(59,130,246,.45); }
    #talk-btn.recording            { background: #3b82f6; color: #0c1222; }
    #talk-btn:disabled             { opacity: .22; cursor: default; }
  </style>
</head>
<body>

<svg id="face" viewBox="0 0 240 310" xmlns="http://www.w3.org/2000/svg" class="s-idle">
  <defs>
    <linearGradient id="head-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a7fd4"/>
      <stop offset="100%" stop-color="#1e3f7a"/>
    </linearGradient>
    <linearGradient id="panel-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6096e8"/>
      <stop offset="100%" stop-color="#3060b0"/>
    </linearGradient>
    <linearGradient id="visor-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#050d1f"/>
      <stop offset="100%" stop-color="#091428"/>
    </linearGradient>
    <radialGradient id="eye-g" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </radialGradient>
  </defs>

  <!-- Antenna -->
  <line x1="120" y1="42" x2="120" y2="18" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
  <circle class="antenna-ball" cx="120" cy="12" r="7" fill="#60a5fa"/>

  <!-- Neck -->
  <rect x="88" y="255" width="64" height="32" rx="10" fill="#1e3a6e" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="98" y="262" width="44" height="18" rx="6"  fill="#162d55"/>

  <!-- Head base -->
  <rect x="18" y="42" width="204" height="218" rx="38" fill="url(#head-g)" stroke="#5b93e0" stroke-width="2"/>

  <!-- Top panel strip -->
  <rect x="48" y="42" width="144" height="28" rx="14" fill="url(#panel-g)"/>
  <!-- Panel rivets -->
  <circle cx="72"  cy="56" r="4" fill="#1e3f7a"/>
  <circle cx="120" cy="56" r="4" fill="#1e3f7a"/>
  <circle cx="168" cy="56" r="4" fill="#1e3f7a"/>

  <!-- Side ear panels -->
  <rect x="5"   y="118" width="18" height="56" rx="9" fill="#2a5aaa" stroke="#4a7fd4" stroke-width="1.5"/>
  <rect x="217" y="118" width="18" height="56" rx="9" fill="#2a5aaa" stroke="#4a7fd4" stroke-width="1.5"/>
  <!-- Ear accent dots -->
  <circle cx="14"  cy="146" r="4" fill="#38bdf8" opacity=".7"/>
  <circle cx="226" cy="146" r="4" fill="#38bdf8" opacity=".7"/>

  <!-- Visor (dark screen) -->
  <rect x="34" y="100" width="172" height="100" rx="20" fill="url(#visor-g)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Visor inner glow rim -->
  <rect x="38" y="104" width="164" height="92" rx="17" fill="none" stroke="#2563eb" stroke-width="1" opacity=".5"/>

  <!-- Left eye -->
  <circle class="eye-iris"  cx="88"  cy="150" r="26" fill="url(#eye-g)"/>
  <circle class="eye-pupil" cx="88"  cy="150" r="15" fill="#042040"/>
  <circle class="eye-shine"           cx="97"  cy="140" r="6"  fill="#e0f2fe" opacity=".7"/>
  <!-- Left eyelid (blink/squint) -->
  <rect class="eyelid" x="62" y="124" width="52" height="52" rx="0"
        fill="#091428" style="transform-box:fill-box;transform-origin:top center;transform:scaleY(0)"/>

  <!-- Right eye -->
  <circle class="eye-iris"  cx="152" cy="150" r="26" fill="url(#eye-g)"/>
  <circle class="eye-pupil" cx="152" cy="150" r="15" fill="#042040"/>
  <circle class="eye-shine"           cx="161" cy="140" r="6"  fill="#e0f2fe" opacity=".7"/>
  <!-- Right eyelid -->
  <rect class="eyelid" x="126" y="124" width="52" height="52" rx="0"
        fill="#091428" style="transform-box:fill-box;transform-origin:top center;transform:scaleY(0)"/>

  <!-- Mouth area -->
  <rect x="72" y="222" width="96" height="26" rx="13" fill="#091428" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Idle smile -->
  <path class="idle-mouth" d="M 86 232 Q 120 248 154 232" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- Speaking bars (5) -->
  <g style="clip-path:inset(0 0 0 0 round 13px)">
    <rect class="mouth-bar" x="82"  y="224" width="10" height="22" rx="3" fill="#38bdf8"
          style="transform-box:fill-box;transform-origin:bottom center"/>
    <rect class="mouth-bar" x="96"  y="224" width="10" height="22" rx="3" fill="#38bdf8"
          style="transform-box:fill-box;transform-origin:bottom center"/>
    <rect class="mouth-bar" x="110" y="224" width="10" height="22" rx="3" fill="#38bdf8"
          style="transform-box:fill-box;transform-origin:bottom center"/>
    <rect class="mouth-bar" x="124" y="224" width="10" height="22" rx="3" fill="#38bdf8"
          style="transform-box:fill-box;transform-origin:bottom center"/>
    <rect class="mouth-bar" x="138" y="224" width="10" height="22" rx="3" fill="#38bdf8"
          style="transform-box:fill-box;transform-origin:bottom center"/>
  </g>
</svg>

<div id="status">Connecting…</div>
<button id="talk-btn" disabled>Hold to Talk</button>

<script>
  const face     = document.getElementById('face');
  const statusEl = document.getElementById('status');
  const btn      = document.getElementById('talk-btn');

  function setState(s) {
    face.setAttribute('class', 's-' + s);
    statusEl.textContent = s;
  }

  const ws = new WebSocket(`ws://${location.host}/ws`);
  let mediaRecorder = null, audioChunks = [];
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  let audioQueue = Promise.resolve();
  let pendingAudio = 0;

  function queueAudio(b64) {
    pendingAudio++;
    setState('speaking');
    audioQueue = audioQueue.then(async () => {
      try {
        const bytes  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const buffer = await audioCtx.decodeAudioData(bytes.buffer.slice());
        const src    = audioCtx.createBufferSource();
        src.buffer   = buffer;
        src.connect(audioCtx.destination);
        await new Promise(r => { src.onended = r; src.start(0); });
      } catch(e) {
        console.error('[audio]', e);
      } finally {
        pendingAudio--;
        if (pendingAudio === 0) setState('idle');
      }
    });
  }

  ws.onopen  = () => { setState('idle'); btn.disabled = false; };
  ws.onclose = () => { statusEl.textContent = 'disconnected'; btn.disabled = true; };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'state') {
      if (msg.state !== 'speaking' && msg.state !== 'idle') setState(msg.state);
    } else if (msg.type === 'audio') {
      queueAudio(msg.data);
    } else if (msg.type === 'speak') {
      speechSynthesis.speak(new SpeechSynthesisUtterance(msg.text));
    }
  };

  btn.addEventListener('mousedown',  startRecording);
  btn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  btn.addEventListener('mouseup',    stopRecording);
  btn.addEventListener('touchend',   stopRecording);

  async function startRecording() {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    btn.classList.add('recording');
    const stream  = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks   = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = sendAudio;
    mediaRecorder.start();
    setState('listening');
  }

  function stopRecording() {
    btn.classList.remove('recording');
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }

  async function sendAudio() {
    const blob   = new Blob(audioChunks, { type: 'audio/webm' });
    const buffer = await blob.arrayBuffer();
    const b64    = btoa(String.fromCharCode(...new Uint8Array(buffer)));
    ws.send(JSON.stringify({ type: 'audio', data: b64 }));
  }
</script>
</body>
</html>
